name: MLOps Container Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Runs daily at 23:00 UTC (12:00 AM GMT+1) Sunday through Thursday
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # Keeps a manual trigger button available in your UI

jobs:
  validate-environment:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Build Production Image
      run: |
        docker build -t fx-screener:test .
        echo "✅ Container environment built successfully in the cloud!"